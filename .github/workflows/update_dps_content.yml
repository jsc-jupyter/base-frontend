name: Update DPS Content (test)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  update-dps:
    runs-on: ubuntu-latest
    environment: generator

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone generator from GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.LEGAL_GENERATOR_ACCESS_TOKEN }}
          GITLAB_USER: ${{ secrets.LEGAL_GENERATOR_ACCESS_USERNAME }}
        run: |
          git clone --single-branch --branch main https://${GITLAB_USER}:${GITLAB_TOKEN}@gitlab.jsc.fz-juelich.de/fsd/common/legal-documents-generator.git generator

      - name: Install generator dependencies
        run: |
          pip install -r generator/requirements.txt

      - name: Generate DPS content (safe)
        run: |
          tree templates/generator
          cp templates/generator/dps_content.html templates/generator/dps_content.html.bak || true

          python generator/src/main.py \
            --doc_type dps \
            --data_type html \
            --config templates/generator/dps_content.json \
            --out templates/generator/dps_content.html \
          || (
            echo "Generation failed, restoring old file"
            mv templates/generator/dps_content.html.bak templates/generator/dps_content.html
          )
          tree templates/generator
          if git diff --quiet templates/generator/dps_content.html; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add templates/generator/dps_content.html
          git commit -m "Update DPS content (test, auto-generated)"
          git push origin test